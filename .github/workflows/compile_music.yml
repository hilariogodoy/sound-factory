name: Compile Music Track

on:
  workflow_dispatch:
    inputs:
      bpm:
        description: 'Target BPM'
        required: false
        default: '133'
      key:
        description: 'Musical key'
        required: false
        default: 'A minor'
      energy:
        description: 'Energy level 0.0-1.0'
        required: false
        default: '0.8'
      mood:
        description: 'Mood descriptor'
        required: false
        default: 'hypnotic'
      track-id:
        description: 'Track identifier'
        required: false
        default: 'track_001'

jobs:
  produce:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y portaudio19-dev python3-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run production pipeline
        run: |
          python src/main.py \
            --bpm ${{ inputs.bpm }} \
            --key "${{ inputs.key }}" \
            --energy ${{ inputs.energy }} \
            --mood "${{ inputs.mood }}" \
            --track-id ${{ inputs.track-id }}
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      - name: Upload WAV artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.track-id }}
          path: warehouse/gold_outputs/${{ inputs.track-id }}/
